<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة أعضاء فريق النخبة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2d7a6f;
            --secondary-color: #1f524a;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }

        /* تحسين الألوان لو المستخدم مشغل الوضع الداكن في تيليجرام */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #182533;
                --card-bg: #223140;
                --text-color: #f5f5f5;
                --border-color: #2b394a;
                --primary-color: #64b5a6;
            }
        }

        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* حالة التحميل التلقائي */
        .loading-box {
            padding: 40px;
            text-align: center;
            display: block;
        }

        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* شاشة تسجيل الدخول */
        .login-box {
            padding: 30px 20px;
            text-align: center;
            display: none;
        }

        .login-box h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            text-align: center;
            background: transparent;
            color: var(--text-color);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-msg {
            color: #d9534f;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        /* شاشة ملف العضو */
        .profile-box {
            display: none;
        }

        .header-band {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header-band .main-title {
            font-size: 22px;
            font-weight: bold;
        }

        .section-title {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            opacity: 0.9;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
        }

        .info-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 15px;
        }

        .info-table td.label {
            font-weight: bold;
            color: var(--primary-color);
            width: 35%;
        }

        .skills-container {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-tag {
            background-color: rgba(45, 122, 111, 0.1);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(45, 122, 111, 0.2);
        }

        .footer-note {
            padding: 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
            background: rgba(0,0,0,0.02);
        }

        .logout-btn {
            background: #d9534f;
            margin: 15px;
            width: calc(100% - 30px);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loadingSection" class="loading-box">
        <div class="spinner"></div>
        <p>جاري التحقق من الهوية الرقمية عبر تيليجرام...</p>
    </div>

    <div id="loginSection" class="login-box">
        <h2>فريق النخبة</h2>
        <p>بوابة الاستعلام عن ملفات الأعضاء الشخصية</p>
        
        <div class="input-group">
            <label for="username">اسم المستخدم (بدون @):</label>
            <input type="text" id="username" placeholder="مثال: h1mm4" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="pin">الرمز السري:</label>
            <input type="password" id="pin" placeholder="••••" inputmode="numeric">
        </div>
        
        <button class="btn" onclick="manualLogin()">تسجيل الدخول</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <div id="profileSection" class="profile-box">
        <div class="header-band">
            <div style="font-size: 12px; opacity: 0.8;">الإدارة العامة</div>
            <div class="main-title">فريق النخبة</div>
        </div>

        <div class="section-title">بطاقة العضو التعريفية</div>
        <table class="info-table">
            <tr>
                <td class="label">الاسم الثنائي:</td>
                <td id="res-name"></td>
            </tr>
            <tr>
                <td class="label">المعرف:</td>
                <td id="res-username" style="font-weight: bold;"></td>
            </tr>
            <tr>
                <td class="label">الصفة والمناصب:</td>
                <td id="res-title"></td>
            </tr>
            <tr>
                <td class="label">اللجان والملفات:</td>
                <td id="res-department"></td>
            </tr>
            <tr>
                <td class="label">تاريخ الانضمام:</td>
                <td id="res-joinDate"></td>
            </tr>
        </table>

        <div class="section-title">القدرات والمهارات الشخصية</div>
        <div class="skills-container" id="res-skills"></div>

        <div class="footer-note">
            منظومة النخبة الرقمية الآمنة 2026
        </div>

        <button class="btn logout-btn" onclick="logout()">تسجيل الخروج</button>
    </div>
</div>

<script>
    // قاعدة البيانات المدمجة (بياناتك الحقيقية + حساب وهمي للتجربة)
    const membersDatabase = [
        {
            username: "h1mm4",
            pin: "2026",
            name: "همام أحمد الكانمي",
            title: "مؤسس الفريق، مدير الفريق، رئيس مشروع بوتات زيد، مسؤول العلاقات للرجال، مدير مشروع لأكون فصيحاً.",
            department: "الإدارة العامة، قسم التسجيل والانتساب، قسم مشروع فضاء، لجنة مشروع بوتات زيد، اللجنة التنظيمية، لجنة الإشراف، مشروع لأكون فصيحاً.",
            joinDate: "26 مارس 2024",
            skills: ["كاتب مبتدئ", "خبرة في التصميم", "متفاعل بشكل دائم", "خبرة واسعة في التيليجرام", "مطور بوتات", "يعمل تحت الضغط", "إعداد النماذج والملفات"]
        },
        {
            username: "elite_test",
            pin: "7788",
            name: "عضو تجريبي وهمي",
            title: "نائب مسؤول قسم التصميم",
            department: "اللجنة الفنية، قسم الميديا والتصميم",
            joinDate: "1 يناير 2026",
            skills: ["تصميم فوتوشوب", "تنسيق ألوان", "مونتاج سريع"]
        }
    ];

    // بدء تشغيل وتجهيز التطبيق المصغر
    document.addEventListener("DOMContentLoaded", function() {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // تمديد التطبيق ليأخذ الشاشة كاملة
            
            // محاولة التقاط اسم المستخدم تلقائياً من التيليجرام
            const tgUser = window.Telegram.WebApp.initDataUnsafe?.user?.username;
            
            if (tgUser) {
                const cleanTgUser = tgUser.trim().toLowerCase();
                // البحث في قاعدة البيانات إذا كان اليوزر مسجل لتسجيل دخوله تلقائياً
                const foundUser = membersDatabase.find(m => m.username === cleanTgUser);
                
                if (foundUser) {
                    showProfile(foundUser);
                    return; // تسجيل دخول تلقائي ناجح!
                }
            }
        }
        
        // إذا فشل التعرف التلقائي أو فتح من متصفح عادي، اظهر شاشة الدخول اليدوي
        document.getElementById('loadingSection').style.display = 'none';
        document.getElementById('loginSection').style.display = 'block';
    });

    // تسجيل الدخول اليدوي باليوزر والرمز
    function manualLogin() {
        const userInput = document.getElementById('username').value.trim().toLowerCase();
        const pinInput = document.getElementById('pin').value.trim();
        const errorMsg = document.getElementById('errorMsg');

        const user = membersDatabase.find(m => m.username === userInput && m.pin === pinInput);

        if (user) {
            errorMsg.style.display = 'none';
            showProfile(user);
        } else {
            errorMsg.innerText = 'اسم المستخدم أو الرمز السري غير صحيح!';
            errorMsg.style.display = 'block';
        }
    }

    // دالة عرض الملف الشخصي وتعبئة البيانات
    function showProfile(user) {
        document.getElementById('loadingSection').style.display = 'none';
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('profileSection').style.display = 'block';

        document.getElementById('res-name').innerText = user.name;
        document.getElementById('res-username').innerText = '@' + user.username.toUpperCase();
        document.getElementById('res-title').innerText = user.title;
        document.getElementById('res-department').innerText = user.department;
        document.getElementById('res-joinDate').innerText = user.joinDate;

        const skillsDiv = document.getElementById('res-skills');
        skillsDiv.innerHTML = '';
        user.skills.forEach(skill => {
            const span = document.createElement('span');
            span.className = 'skill-tag';
            span.innerText = skill;
            skillsDiv.appendChild(span);
        });
    }

    // تسجيل الخروج والعودة للشاشة اليدوية
    function logout() {
        document.getElementById('username').value = '';
        document.getElementById('pin').value = '';
        document.getElementById('profileSection').style.display = 'none';
        document.getElementById('loginSection').style.display = 'block';
    }
</script>

</body>
</html>
